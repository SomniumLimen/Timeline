<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>当城市沉入梦乡</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-labelledby="page-title">
      <section class="hero" aria-label="开篇">
        <p class="eyebrow">深夜职业时间轴</p>
        <h1 id="page-title">当城市沉入梦乡</h1>
        <p class="lead">
          从零点到黎明，沿着一条温暖的夜路，遇见那些默默守住城市的人。
        </p>
        <div class="hero-clock" aria-hidden="true">
          <span>00:00</span>
          <i></i>
        </div>
        <p class="scroll-cue">向下滑动</p>
      </section>

      <nav class="time-dock" aria-label="时间节点">
        <span id="dockTime">00:00</span>
        <div id="dockDots" class="dock-dots"></div>
      </nav>

      <section class="journey" aria-label="深夜职业长图">
        <svg class="road" viewBox="0 0 390 5400" preserveAspectRatio="none" aria-hidden="true">
          <path
            class="road-shadow"
            d="M250 0 C112 360 318 710 168 1080 C58 1358 326 1710 226 2160 C132 2585 332 2858 162 3240 C58 3475 290 3858 206 4320 C144 4660 290 5005 152 5400"
          />
          <path
            class="road-fill"
            d="M250 0 C112 360 318 710 168 1080 C58 1358 326 1710 226 2160 C132 2585 332 2858 162 3240 C58 3475 290 3858 206 4320 C144 4660 290 5005 152 5400"
          />
          <path
            class="road-line"
            d="M250 0 C112 360 318 710 168 1080 C58 1358 326 1710 226 2160 C132 2585 332 2858 162 3240 C58 3475 290 3858 206 4320 C144 4660 290 5005 152 5400"
          />
        </svg>
        <div class="traveler" id="traveler" aria-hidden="true">
          <img src="./assets/story-art/traveler-arrow.png" alt="" />
        </div>
        <div id="storyCards" class="story-cards"></div>
      </section>

    </main>

    <section class="story-dialog" id="storyDialog" aria-hidden="true">
      <div class="dialog-backdrop" data-close-dialog></div>
      <article class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
        <button class="dialog-close" type="button" aria-label="关闭详情" data-close-dialog>×</button>
        <div class="dialog-media" id="dialogMedia"></div>
        <div class="dialog-body">
          <p class="dialog-kicker" id="dialogKicker"></p>
          <h2 id="dialogTitle"></h2>
          <p class="dialog-subtitle" id="dialogSubtitle"></p>
          <p class="dialog-tone" id="dialogTone"></p>
          <div class="dialog-text" id="dialogText"></div>
        </div>
      </article>
    </section>

    <button class="music-toggle" id="musicToggle" type="button" aria-label="切换背景音乐">
      <span id="musicStatus">音乐</span>
    </button>
    <audio id="bgMusic" src="./assets/web/soothing-song.mp3" autoplay loop preload="auto"></audio>

    <script src="./script.js"></script>
  </body>
</html>
